<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCIENCE & MANAGEMENT QUIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
body { font-family: Arial; background: linear-gradient(135deg,#141e30,#243b55); display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.title { font-family:'Pacifico',cursive; font-size:40px; color:#ffeb3b; animation: glow 1.5s infinite alternate; }
@keyframes glow { from {text-shadow:0 0 10px #fff;} to {text-shadow:0 0 25px #ffeb3b;} }
.box { background:rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding:25px; border-radius:15px; width:90%; max-width:450px; text-align:center; color:white; }
input, select, button { width:100%; padding:12px; margin:10px 0; border:none; border-radius:12px; font-size:16px; }
button { background:#00c853; color:white; font-weight:bold; cursor:pointer; transition:all 0.3s ease; }
button:hover { background:#00e676; transform:scale(1.05); }
.fancySelect { border:2px solid #ffeb3b; background: rgba(0,0,0,0.5); color:#ffeb3b; font-weight:bold; text-align:center; cursor:pointer; transition:all 0.3s ease; appearance:none; -webkit-appearance:none; -moz-appearance:none; }
.fancySelect option { background:#141e30; color:#ffeb3b; }
.fancySelect:hover { background: rgba(0,0,0,0.7); transform: scale(1.05); border-color: #00e676; }
.correct {background:green!important;} .wrong {background:red!important;}
#question {animation:fade 0.5s;}
@keyframes fade {from{opacity:0;} to{opacity:1;}}
</style>
</head>
<body>

<div class="box" id="startBox">
  <h1 class="title">QUIZ</h1>
  <input id="playerName" placeholder="Your Name">
  <select id="stream" class="fancySelect">
    <option value="">Select Stream</option>
    <option value="science">Science</option>
    <option value="management">Management</option>
  </select>
  <select id="numQuestions" class="fancySelect">
    <option value="">Select No. of Questions</option>
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="30">30</option>
    <option value="40">40</option>
    <option value="50">50</option>
  </select>
  <button onclick="startQuiz()">Start</button>
</div>

<div class="box" id="quizBox" style="display:none;">
  <h3 id="timer"></h3>
  <h3 id="progress"></h3>
  <div id="progressBarContainer" style="background:#555; border-radius:12px; height:15px; margin:10px 0;">
    <div id="progressBar" style="height:100%; width:0%; background:#00e676; border-radius:12px;"></div>
  </div>
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<script>
// Variables
let i=0, score=0, time=15, timer;
let questions=[], playerName="", stream="", numQuestions=10;

// --- Science Questions ---
const scienceQuestions = [
  {q:"Velocity formula?", o:["s/t","v^2/t","s*t"], a:0}, {q:"Newton's 1st law?", o:["Inertia","F=ma","Action-reaction"], a:0},
  {q:"Acceleration?", o:["v-u/t","s/t","F/m"], a:0}, {q:"Force?", o:["ma","mv","m+a"], a:0},
  {q:"Unit of force?", o:["Newton","Joule","Watt"], a:0}, {q:"Unit of energy?", o:["Joule","Newton","Watt"], a:0},
  {q:"Gravitational constant?", o:["6.67e-11","9.8","3e8"], a:0}, {q:"Speed of light?", o:["3e8 m/s","9.8 m/s^2","1e6"], a:0},
  {q:"Work formula?", o:["F*d","m*v","1/2mv^2"], a:0}, {q:"Power formula?", o:["Work/Time","F*d","E/m"], a:0},
  {q:"Water formula?", o:["H2O","CO2","NaCl"], a:0}, {q:"Acid example?", o:["HCl","NaOH","CH4"], a:0},
  {q:"Base example?", o:["NaOH","HCl","CO2"], a:0}, {q:"Atomic number?", o:["Protons","Neutrons","Electrons"], a:0},
  {q:"Mass number?", o:["Protons+Neutrons","Electrons+Protons","Only Neutrons"], a:0}, {q:"pH neutral?", o:["7","0","14"], a:0},
  {q:"DNA stands for?", o:["Deoxyribonucleic Acid","Ribonucleic Acid","Protein"], a:0}, {q:"Mitochondria?", o:["Powerhouse","Nucleus","Ribosome"], a:0},
  {q:"Photosynthesis?", o:["CO2+H2O->O2+Glucose","O2+H2O->CO2","C6H12O6->CO2"], a:0}, {q:"Cell membrane?", o:["Control entry/exit","Support","Replication"], a:0},
  {q:"Derivative x^2?", o:["2x","x","x^3"], a:0}, {q:"Integral x?", o:["0.5x^2","x^2","x"], a:0}, {q:"Circle area?", o:["πr^2","2πr","πd"], a:0},
  {q:"HTML full form?", o:["Hyper Text Markup Language","High Text","Hyperlink"], a:0}, {q:"JS var?", o:["let","varies","set"], a:0}
];

// --- Management Questions ---
const managementQuestions = [
  {q:"Law of Demand?", o:["Price↑ Q↓","Price↑ Q↑","Same"], a:0}, {q:"GDP full form?", o:["Gross Domestic Product","Global Data","General Demand"], a:0},
  {q:"Inflation?", o:["Price rise","Money decrease","Population rise"], a:0}, {q:"Market type?", o:["Perfect","Free","None"], a:0}, {q:"Fiscal policy?", o:["Govt spend/tax","Private","None"], a:0}
];

// Functions
function shuffleOptions(q){
  let correct = q.o[q.a];
  let opts = q.o.slice();
  for(let i=opts.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [opts[i],opts[j]]=[opts[j],opts[i]];
  }
  q.a = opts.indexOf(correct);
  q.o = opts;
}

function startQuiz(){
  playerName=document.getElementById("playerName").value.trim().toUpperCase();
  stream=document.getElementById("stream").value;
  numQuestions=parseInt(document.getElementById("numQuestions").value);
  if(!playerName || !stream || !numQuestions){ alert("Fill all fields!"); return; }
  let data=(stream=="science")?scienceQuestions:managementQuestions;
  questions=data.sort(()=>Math.random()-0.5).slice(0,numQuestions);
  i=0; score=0;
  document.getElementById("startBox").style.display="none";
  document.getElementById("quizBox").style.display="block";
  loadQuestion();
}

function startTimer(){
  clearInterval(timer);
  time=15;
  timer=setInterval(()=>{
    document.getElementById("timer").innerText="Time: "+time;
    time--;
    if(time<0){ clearInterval(timer); showCorrect(); setTimeout(nextQuestion,1000);}
  },1000);
}

function loadQuestion(){
  let q=questions[i];
  shuffleOptions(q);
  document.getElementById("question").innerText=q.q;
  document.getElementById("progress").innerText=`Question ${i+1}/${questions.length}`;
  document.getElementById("progressBar").style.width=((i+1)/questions.length)*100+"%";
  let opts="";
  q.o.forEach((opt,idx)=>{ opts+=`<button onclick="checkAnswer(this,${idx})">${opt}</button>`; });
  document.getElementById("options").innerHTML=opts;
  startTimer();
}

function showCorrect(){
  let btns=document.querySelectorAll("#options button");
  let q=questions[i];
  btns.forEach((b,idx)=>{ if(idx==q.a) b.classList.add("correct"); });
}

function checkAnswer(btn,ans){
  clearInterval(timer);
  let btns=document.querySelectorAll("#options button");
  let q=questions[i];
  btns.forEach((b,idx)=>{
    b.disabled=true;
    if(idx==q.a) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  if(ans == q.a) score++;
  setTimeout(nextQuestion,1000);
}

function nextQuestion(){
  i++;
  if(i<questions.length) loadQuestion();
  else {document.getElementById("progressBar").style.width="100%"; finishQuiz();}
}

function finishQuiz(){
  let board=JSON.parse(localStorage.getItem("board"))||[];
  board.push({name:playerName, score:score});
  board.sort((a,b)=>b.score-a.score);
  board=board.slice(0,5);
  localStorage.setItem("board", JSON.stringify(board));

  let html="<h3>🏆 Leaderboard</h3>";
  board.forEach((p,i)=>{ html+=`<p>${i+1}. ${p.name} - ${p.score}</p>`; });

  document.body.innerHTML=`
    <div class="box">
      <h2 style="color:#00e676; animation: glow 1s infinite alternate;">🎉 Congratulations ${playerName}! 🎉</h2>
      <h3>Your Score is: ${score} / ${questions.length}</h3>
      ${score >= Math.ceil(questions.length/2) 
        ? "<p>👏 Great Job! You passed the quiz!</p>" 
        : "<p>😅 Keep Practicing! You can do better!</p>"}
      ${html}
      <button onclick="location.reload()">Restart Quiz</button>
    </div>
  `;
}
</script>
</body>
</html>
